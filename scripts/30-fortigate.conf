# Install this file to:
#   /etc/rsyslog.d/30-fortigate.conf
#
# File layout:
#   /var/log/fortigate/incoming.log  -> traffic logs only
#   /var/log/fortigate/event.log     -> event logs only
#   /var/log/fortigate/other.log     -> all other FortiGate log types

module(load="imudp")

template(name="FortiGateRawNoPri" type="list") {
  property(name="rawmsg-after-pri")
  constant(value="\n")
}

input(type="imudp" port="514" ruleset="fortigate")

ruleset(name="fortigate") {
  if ($rawmsg contains "type=\"traffic\"") then {
    action(
      type="omfile"
      file="/var/log/fortigate/incoming.log"
      template="FortiGateRawNoPri"
      createDirs="on"
      DirCreateMode="0750"
      FileCreateMode="0640"
    )
    stop
  }

  if ($rawmsg contains "type=\"event\"") then {
    action(
      type="omfile"
      file="/var/log/fortigate/event.log"
      template="FortiGateRawNoPri"
      createDirs="on"
      DirCreateMode="0750"
      FileCreateMode="0640"
    )
    stop
  }

  action(
    type="omfile"
    file="/var/log/fortigate/other.log"
    template="FortiGateRawNoPri"
    createDirs="on"
    DirCreateMode="0750"
    FileCreateMode="0640"
  )
}
